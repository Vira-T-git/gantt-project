<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Gantt</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.css">

  <style>
    body { font-family: Arial; padding: 20px; }
    #gantt { border: 1px solid #ddd; padding: 10px; }
  </style>
</head>

<body>

<h2>Project Gantt</h2>
<div id="gantt"></div>

<script src="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.min.js"></script>

<script>

const API_URL =
  "https://script.google.com/macros/s/AKfycbwwTTsvFxY26jIw-xs-NPuXHW5HqoGTpi-yyrNpH3YYW1b427clYjVm25kZNpNbWC2O/exec";

// --------------------
// SAFE DATE
// --------------------
function safeDate(d) {
  const date = new Date(d);
  if (isNaN(date)) return null;
  return date.toISOString().split("T")[0];
}

// --------------------
// LOAD
// --------------------
function loadTasks() {

  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      const tasks = data
        .map(t => {

          const start = safeDate(t.start);
          const end = safeDate(t.end);

          if (!t.id || !t.task || !start || !end) return null;

          return {
            id: t.id,
            name: t.task,
            start,
            end,
            progress: Number(t.progress || 0)
          };
        })
        .filter(Boolean); // remove bad rows

      renderGantt(tasks);
    });
}

// --------------------
// RENDER (FIXED $bar CRASH)
// --------------------
function renderGantt(tasks) {

  const el = document.getElementById("gantt");

  // IMPORTANT: FULL RESET
  el.innerHTML = "";

  window.gantt = new Gantt("#gantt", tasks, {

    readonly: false,

    on_date_change: function(task, start, end) {
      updateTask(task.id, start, end, task.progress || 0);
    },

    on_progress_change: function(task, progress) {
      updateTask(task.id, task.start, task.end, progress);
    }
  });
}

// --------------------
// UPDATE (GET ONLY)
// --------------------
function updateTask(id, start, end, progress) {

  const url =
    `${API_URL}?id=${id}` +
    `&start=${safeDate(start)}` +
    `&end=${safeDate(end)}` +
    `&progress=${progress}`;

  fetch(url)
    .then(r => r.text())
    .then(res => {
      console.log("UPDATED:", res);
    })
    .catch(err => console.error("UPDATE FAIL:", err));
}

// --------------------
// INIT
// --------------------
window.addEventListener("load", loadTasks);

</script>

</body>
</html>
