<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Project Gantt</title>

  <!-- Frappe Gantt CSS -->
  <link rel="stylesheet" href="frappe-gantt.css">

  <!-- Frappe Gantt JS -->
  <script src="frappe-gantt.min.js"></script>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
  </style>
</head>
<body>

<h2>Project Gantt</h2>
<div id="gantt"></div>

<script>

window.onload = function() {

  const API_URL = "https://script.google.com/macros/s/AKfycbxunA7QowpwIc8UGNcDBw66bG7-bPgOYoJKqj6kiy95cpWnIKLMP5sgB4JJZG3Ot8g/exec";

  function formatDate(date) {
    let d = new Date(date);
    return d.toISOString().split('T')[0];
  }

  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      console.log("DATA FROM SHEET:", data);

      let tasks = data.map(item => ({
        id: item.id,
        name: item.task,
        start: formatDate(item.start),
        end: formatDate(item.end),
        progress: Number(item.progress)
      }));

      console.log("FORMATTED TASKS:", tasks);

      let gantt = new Gantt("#gantt", tasks, {
        readonly: false,

        on_date_change: function(task, start, end) {
          console.log("DATE CHANGE:", task.id);
          updateTask(task.id, start, end, task.progress);
        },

        on_progress_change: function(task, progress) {
          console.log("PROGRESS CHANGE:", task.id);
          updateTask(task.id, task._start, task._end, progress);
        }
      });

    })
    .catch(err => {
      console.error("FETCH ERROR:", err);
    });

};


// 🔁 Update function OUTSIDE
function updateTask(id, start, end, progress) {

  const API_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

  function formatDate(date) {
    let d = new Date(date);
    return d.toISOString().split('T')[0];
  }

  console.log("SENDING UPDATE:", id);

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify({
      id: id,
      start: formatDate(start),
      end: formatDate(end),
      progress: progress
    })
  })
  .then(res => res.text())
  .then(res => {
    console.log("UPDATE RESPONSE:", res);
    alert("Task updated!");
  })
  .catch(err => {
    console.error("UPDATE ERROR:", err);
    alert("Update failed!");
  });
}

</script>
