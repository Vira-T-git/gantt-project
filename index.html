<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gantt Project</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.css">

  <style>
    body { font-family: Arial; padding: 20px; }
    #gantt { margin-top: 20px; }

    .controls {
      margin-bottom: 10px;
    }

    input {
      margin: 2px;
      padding: 5px;
    }
  </style>
</head>

<body>

<h2>Project Gantt</h2>

<div class="controls">
  <input id="task" placeholder="Task">
  <input id="start" type="date">
  <input id="end" type="date">
  <button onclick="addTask()">Add Task</button>
</div>

<div class="controls">
  <input id="deleteId" placeholder="Task ID">
  <button onclick="deleteTask()">Delete Task</button>
</div>

<div id="gantt"></div>

<script src="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.min.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwwTTsvFxY26jIw-xs-NPuXHW5HqoGTpi-yyrNpH3YYW1b427clYjVm25kZNpNbWC2O/exec";

// =========================
// SAFE DATE FORMAT (prevents 1-day shift)
// =========================
function toDateString(d) {
  if (!d) return "";
  if (typeof d === "string" && d.length === 10) return d;

  const date = new Date(d);
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");

  return `${y}-${m}-${day}`;
}

// =========================
document.addEventListener("DOMContentLoaded", loadTasks);
// =========================

function loadTasks() {

  fetch(`${API_URL}?action=fetch`)
    .then(r => r.json())
    .then(data => {

      const tasks = data.map(t => ({
        id: String(t.id),
        name: t.task,
        start: toDateString(t.start),
        end: toDateString(t.end),
        progress: Number(t.progress)
      }));

      render(tasks);
    })
    .catch(err => console.error("FETCH ERROR:", err));
}

function render(tasks) {

  const container = document.getElementById("gantt");
  container.innerHTML = "";

  new Gantt("#gantt", tasks, {

    view_mode: "Day",
    readonly: false,

    on_date_change: (task, start, end) => {
      update(task.id, start, end, task.progress);
    },

    on_progress_change: (task, progress) => {
      update(task.id, task.start, task.end, progress);
    }
  });
}

// =========================
// UPDATE TASK
// =========================
function update(id, start, end, progress) {

  const url =
    `${API_URL}?action=update&id=${id}` +
    `&start=${toDateString(start)}` +
    `&end=${toDateString(end)}` +
    `&progress=${progress}`;

  fetch(url)
    .then(r => r.text())
    .then(res => {
      console.log("UPDATED:", res);
      loadTasks();
    })
    .catch(err => console.error("UPDATE ERROR:", err));
}

// =========================
// ADD TASK
// =========================
function addTask() {

  const task = document.getElementById("task").value;
  const start = document.getElementById("start").value;
  const end = document.getElementById("end").value;

  const id = Date.now();

  const url =
    `${API_URL}?action=add&id=${id}` +
    `&task=${encodeURIComponent(task)}` +
    `&start=${start}` +
    `&end=${end}` +
    `&progress=0` +
    `&owner=NA&status=Not Started`;

  fetch(url)
    .then(r => r.text())
    .then(res => {
      console.log("ADDED:", res);
      loadTasks();
    })
    .catch(err => console.error("ADD ERROR:", err));
}

// =========================
// DELETE TASK
// =========================
function deleteTask() {

  const id = document.getElementById("deleteId").value;

  const url = `${API_URL}?action=delete&id=${id}`;

  fetch(url)
    .then(r => r.text())
    .then(res => {
      console.log("DELETED:", res);
      loadTasks();
    })
    .catch(err => console.error("DELETE ERROR:", err));
}

</script>

</body>
</html>
