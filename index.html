<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwwTTsvFxY26jIw-xs-NPuXHW5HqoGTpi-yyrNpH3YYW1b427clYjVm25kZNpNbWC2O/exec";

// =========================
// FIX: Safe date handling (NO timezone shift)
// =========================
function toDateString(d) {
  if (!d) return "";

  if (typeof d === "string" && d.length === 10) {
    return d;
  }

  const date = new Date(d);

  const year = date.getFullYear();
  const month = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");

  return `${year}-${month}-${day}`;
}

// =========================
window.addEventListener("load", loadTasks);
// =========================

function loadTasks() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      const tasks = data.map(t => ({
        id: String(t.id),
        name: t.task,
        start: toDateString(t.start),
        end: toDateString(t.end),
        progress: Number(t.progress)
      }));

      renderGantt(tasks);
    })
    .catch(err => console.error("FETCH ERROR:", err));
}

function renderGantt(tasks) {

  document.getElementById("gantt").innerHTML = "";

  new Gantt("#gantt", tasks, {
    view_mode: "Day",
    readonly: false,

    // =========================
    // DATE CHANGE
    // =========================
    on_date_change: function(task, start, end) {
      updateTask(task.id, start, end, task.progress);
    },

    // =========================
    // PROGRESS CHANGE
    // =========================
    on_progress_change: function(task, progress) {
      updateTask(task.id, task.start, task.end, progress);
    }
  });
}

// =========================
// UPDATE API CALL
// =========================
function updateTask(id, start, end, progress) {

  const url =
    `${API_URL}?id=${id}` +
    `&start=${toDateString(start)}` +
    `&end=${toDateString(end)}` +
    `&progress=${progress}`;

  fetch(url)
    .then(res => res.text())
    .then(res => {
      console.log("UPDATED:", res);
      loadTasks(); // refresh sync
    })
    .catch(err => console.error("UPDATE ERROR:", err));
}

</script>
