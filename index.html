<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Gantt Project</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.css">

  <style>
    body { font-family: Arial; padding: 20px; }
    #gantt { border: 1px solid #ddd; padding: 10px; }
  </style>
</head>

<body>

<h2>Project Gantt</h2>
<div id="gantt"></div>

<script src="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.min.js"></script>

<script>

const API_URL =
  "https://script.google.com/macros/s/AKfycbwwTTsvFxY26jIw-xs-NPuXHW5HqoGTpi-yyrNpH3YYW1b427clYjVm25kZNpNbWC2O/exec";

// --------------------
// DATE FORMAT FIX
// --------------------
function toDate(d) {
  return new Date(d).toISOString().split("T")[0];
}

// --------------------
// LOAD DATA
// --------------------
function loadTasks() {

  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      const tasks = data.map(t => ({
        id: t.id,
        name: t.task,
        start: toDate(t.start),
        end: toDate(t.end),
        progress: Number(t.progress || 0)
      }));

      renderGantt(tasks);
    });
}

// --------------------
// RENDER GANTT
// --------------------
function renderGantt(tasks) {

  document.getElementById("gantt").innerHTML = "";

  window.gantt = new Gantt("#gantt", tasks, {

    readonly: false,

    on_date_change: function(task, start, end) {
      updateTask(task.id, start, end, task.progress);
    },

    on_progress_change: function(task, progress) {
      updateTask(task.id, task.start, task.end, progress);
    }
  });
}

// --------------------
// UPDATE BACKEND (IMPORTANT: GET ONLY)
// --------------------
function updateTask(id, start, end, progress) {

  const url =
    `${API_URL}?id=${id}` +
    `&start=${toDate(start)}` +
    `&end=${toDate(end)}` +
    `&progress=${progress}`;

  fetch(url)
    .then(r => r.text())
    .then(res => {
      console.log("UPDATED:", res);
    })
    .catch(err => console.error("UPDATE FAILED:", err));
}

// --------------------
// INIT
// --------------------
window.addEventListener("load", loadTasks);

</script>

</body>
</html>
