<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gantt Project</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.css">

  <style>
    body { font-family: Arial; padding: 20px; }

    #controls { margin-bottom: 15px; }

    input, button { margin: 4px; padding: 6px; }

    #gantt { margin-top: 20px; }
  </style>
</head>

<body>

<h2>Project Gantt</h2>

<!-- CONTROLS -->
<div id="controls">
  <input id="task" placeholder="Task">
  <input id="start" type="date">
  <input id="end" type="date">
  <input id="owner" placeholder="Owner">
  <button onclick="addTask()">➕ Add</button>

  <input id="deleteId" placeholder="ID">
  <button onclick="deleteTask()">🗑 Delete</button>
</div>

<div id="gantt"></div>

<script src="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.min.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwwTTsvFxY26jIw-xs-NPuXHW5HqoGTpi-yyrNpH3YYW1b427clYjVm25kZNpNbWC2O/exec";

// ================= DATE FIX =================
function toDateString(d) {
  if (!d) return "";
  if (typeof d === "string" && d.length === 10) return d;
  return new Date(d).toISOString().split("T")[0];
}

// ================= LOAD =================
document.addEventListener("DOMContentLoaded", loadTasks);

function loadTasks() {
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      const tasks = data.map(t => ({
        id: String(t.id),
        name: t.task,
        start: toDateString(t.start),
        end: toDateString(t.end),
        progress: Number(t.progress)
      }));

      render(tasks);
    });
}

// ================= RENDER =================
function render(tasks) {

  const el = document.getElementById("gantt");
  el.innerHTML = "";

  new Gantt("#gantt", tasks, {
    view_mode: "Day",
    readonly: false,

    on_date_change: (task, start, end) => {
      update(task.id, start, end, task.progress);
    },

    on_progress_change: (task, progress) => {
      update(task.id, task.start, task.end, progress);
    }
  });
}

// ================= UPDATE =================
function update(id, start, end, progress) {

  const url =
    API_URL +
    `?id=${id}` +
    `&start=${toDateString(start)}` +
    `&end=${toDateString(end)}` +
    `&progress=${progress}`;

  fetch(url)
    .then(() => loadTasks());
}

// ================= ADD (GET ONLY) =================
function addTask() {

  const url =
    API_URL +
    `?action=add` +
    `&id=${Date.now()}` +
    `&task=${encodeURIComponent(task.value)}` +
    `&start=${start.value}` +
    `&end=${end.value}` +
    `&progress=0` +
    `&owner=${encodeURIComponent(owner.value)}` +
    `&status=Not%20Started`;

  fetch(url).then(() => loadTasks());
}

// ================= DELETE (GET ONLY) =================
function deleteTask() {

  fetch(API_URL + `?action=delete&id=${deleteId.value}`)
    .then(() => loadTasks());
}

</script>

</body>
</html>
