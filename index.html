<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxunA7QowpwIc8UGNcDBw66bG7-bPgOYoJKqj6kiy95cpWnIKLMP5sgB4JJZG3Ot8g/exec";

function formatDate(date) {
  let d = new Date(date);
  return d.toISOString().split('T')[0];
}

fetch(API_URL)
  .then(res => res.json())
  .then(data => {

    let tasks = data.map(item => ({
      id: item.id,
      name: item.task,
      start: formatDate(item.start),
      end: formatDate(item.end),
      progress: Number(item.progress)
    }));

    let gantt = new Gantt("#gantt", tasks, {

      on_date_change: function(task, start, end) {
        console.log("DATE CHANGE TRIGGERED", task);
        alert("Date changed for task " + task.id);

        updateTask(task.id, start, end, task.progress);
      },

     on_progress_change: function(task, progress) {
        console.log("PROGRESS CHANGE", task);
        alert("Progress changed");

       updateTask(task.id, task._start, task._end, progress);
      }

    });

  });

// 🔁 Send update to Apps Script
function updateTask(id, start, end, progress) {
  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      id: id,
      start: formatDate(start),
      end: formatDate(end),
      progress: progress
    })
  })
  .then(res => res.text())
  .then(res => console.log("Updated:", res));
}
</script>
