<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Gantt Sheet App</title>

  <!-- Frappe Gantt CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.css">

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    #gantt {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h2>Project Gantt</h2>
<div id="gantt"></div>

<script src="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.min.js"></script>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwwTTsvFxY26jIw-xs-NPuXHW5HqoGTpi-yyrNpH3YYW1b427clYjVm25kZNpNbWC2O/exec";

function formatDate(date) {
  return new Date(date).toISOString().split("T")[0];
}

let ganttInstance = null;

window.addEventListener("load", () => {
  loadTasks();
});

function loadTasks() {
  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      const tasks = data.map(t => ({
        id: String(t.id),
        name: t.task,
        start: formatDate(t.start),
        end: formatDate(t.end),
        progress: Number(t.progress)
      }));

      renderGantt(tasks);
    })
    .catch(err => console.error("FETCH ERROR:", err));
}

function renderGantt(tasks) {

  document.getElementById("gantt").innerHTML = "";

  ganttInstance = new Gantt("#gantt", tasks, {
    view_mode: "Day",
    readonly: false,

    on_date_change: function(task, start, end) {
      updateTask(task.id, start, end, task.progress);
    },

    on_progress_change: function(task, progress) {
      updateTask(task.id, task.start, task.end, progress);
    }
  });
}

function updateTask(id, start, end, progress) {

  const url = `${API_URL}?id=${id}&start=${formatDate(start)}&end=${formatDate(end)}&progress=${progress}`;

  fetch(url)
    .then(res => res.text())
    .then(res => {
      console.log("UPDATED:", res);

      // reload fresh data so UI stays in sync
      loadTasks();
    })
    .catch(err => console.error("UPDATE ERROR:", err));
}
</script>

</body>
</html>
