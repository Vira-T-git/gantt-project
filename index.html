<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gantt Project</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.css">

  <style>
    body { font-family: Arial; padding: 20px; }

    #controls {
      margin-bottom: 15px;
    }

    input, button {
      margin: 4px;
      padding: 6px;
    }
  </style>
</head>

<body>

<h2>Project Gantt</h2>

<!-- ================= CONTROLS ================= -->
<div id="controls">

  <input id="task" placeholder="Task name">
  <input id="start" type="date">
  <input id="end" type="date">
  <input id="owner" placeholder="Owner">

  <button onclick="addTask()">➕ Add Task</button>

  <input id="deleteId" placeholder="Task ID">
  <button onclick="deleteTask()">🗑 Delete Task</button>

</div>

<div id="gantt"></div>

<script src="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.min.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwwTTsvFxY26jIw-xs-NPuXHW5HqoGTpi-yyrNpH3YYW1b427clYjVm25kZNpNbWC2O/exec";

// ================= DATE FIX (IMPORTANT) =================
function toDateString(d) {
  if (!d) return "";
  if (typeof d === "string" && d.length === 10) return d;

  const date = new Date(d);
  return date.toISOString().split("T")[0];
}

// ================= LOAD =================
document.addEventListener("DOMContentLoaded", loadTasks);

function loadTasks() {
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      const tasks = data.map(t => ({
        id: String(t.id),
        name: t.task,
        start: toDateString(t.start),
        end: toDateString(t.end),
        progress: Number(t.progress)
      }));

      render(tasks);
    })
    .catch(err => console.error(err));
}

// ================= RENDER =================
function render(tasks) {

  const container = document.getElementById("gantt");
  container.innerHTML = "";

  new Gantt("#gantt", tasks, {
    view_mode: "Day",
    readonly: false,

    on_date_change: (task, start, end) => {
      update(task.id, start, end, task.progress);
    },

    on_progress_change: (task, progress) => {
      update(task.id, task.start, task.end, progress);
    }
  });
}

// ================= UPDATE (UNCHANGED LOGIC) =================
function update(id, start, end, progress) {

  fetch(API_URL + `?id=${id}&start=${toDateString(start)}&end=${toDateString(end)}&progress=${progress}`)
    .then(r => r.text())
    .then(() => loadTasks())
    .catch(err => console.error("UPDATE ERROR:", err));
}

// ======================================================
// 🔥 ADD TASK (NOW USES POST)
// ======================================================
function addTask() {

  const payload = {
    action: "add",
    id: Date.now(),
    task: document.getElementById("task").value,
    start: document.getElementById("start").value,
    end: document.getElementById("end").value,
    progress: 0,
    owner: document.getElementById("owner").value,
    status: "Not Started"
  };

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(payload)
  })
  .then(r => r.text())
  .then(() => loadTasks())
  .catch(err => console.error("ADD ERROR:", err));
}

// ======================================================
// 🗑 DELETE TASK (NOW USES POST)
// ======================================================
function deleteTask() {

  const id = document.getElementById("deleteId").value;

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      action: "delete",
      id: id
    })
  })
  .then(r => r.text())
  .then(res => {
    console.log(res);
    loadTasks();
  })
  .catch(err => console.error("DELETE ERROR:", err));
}

</script>

</body>
</html>
