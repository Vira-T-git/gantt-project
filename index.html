<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple Gantt</title>

  <!-- Gantt CSS -->
  <link rel="stylesheet" href="https://unpkg.com/frappe-gantt@0.5.0/dist/frappe-gantt.css">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }
  </style>
</head>

<body>

<h2>Project Gantt</h2>
<div id="gantt"></div>

<!-- Gantt JS (global/UMD build) -->
<script src="https://unpkg.com/frappe-gantt@0.5.0/dist/frappe-gantt.min.js"></script>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxunA7QowpwIc8UGNcDBw66bG7-bPgOYoJKqj6kiy95cpWnIKLMP5sgB4JJZG3Ot8g/exec";

// Format date → YYYY-MM-DD
function formatDate(date) {
  let d = new Date(date);
  return d.toISOString().split('T')[0];
}

// Load after page is ready
window.onload = function () {

  console.log("Gantt exists?", window.Gantt);

  fetch(API_URL)
    .then(res => res.json())
    .then(data => {

      let tasks = data.map(item => ({
        id: String(item.id),
        name: item.task,
        start: formatDate(item.start),
        end: formatDate(item.end),
        progress: Number(item.progress)
      }));

      let gantt = new Gantt("#gantt", tasks, {

        readonly: false,

        on_date_change: function(task, start, end) {
          updateTask(task.id, start, end, task.progress);
        },

        on_progress_change: function(task, progress) {
          updateTask(task.id, task._start, task._end, progress);
        }

      });

    })
    .catch(err => console.error("FETCH ERROR:", err));
};

// POST updates back to Apps Script
function updateTask(id, start, end, progress) {

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify({
      id: id,
      start: formatDate(start),
      end: formatDate(end),
      progress: progress
    })
  })
  .then(res => res.text())
  .then(res => console.log("UPDATED:", res))
  .catch(err => console.error("UPDATE ERROR:", err));
}
</script>

</body>
</html>
