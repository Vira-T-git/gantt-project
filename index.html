<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gantt Project</title>

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.css">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    #gantt {
      margin-top: 20px;
    }

    button {
      margin-right: 10px;
      padding: 6px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Project Gantt</h2>

<button onclick="addTaskUI()">+ Add Task</button>
<button onclick="deleteTaskUI()">🗑 Delete Task</button>

<div id="gantt"></div>

<script src="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.min.js"></script>

<script>

const API_URL =
  "https://script.google.com/macros/s/AKfycbwwTTsvFxY26jIw-xs-NPuXHW5HqoGTpi-yyrNpH3YYW1b427clYjVm25kZNpNbWC2O/exec";

// --------------------
// DATE SAFE
// --------------------
function toDateString(d) {
  if (!d) return "";

  if (typeof d === "string" && d.length === 10) return d;

  const date = new Date(d);
  if (isNaN(date)) return "";

  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");

  return `${y}-${m}-${day}`;
}

// --------------------
// LOAD
// --------------------
function loadTasks() {
  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      const tasks = data.map(t => ({
        id: String(t.id),
        name: t.task,
        start: toDateString(t.start),
        end: toDateString(t.end),
        progress: Number(t.progress)
      }));

      render(tasks);
    });
}

// --------------------
// RENDER
// --------------------
function render(tasks) {

  document.getElementById("gantt").innerHTML = "";

  window.gantt = new Gantt("#gantt", tasks, {
    view_mode: "Day",
    readonly: false,

    on_date_change: (task, start, end) => {
      update(task.id, start, end, task.progress);
    },

    on_progress_change: (task, progress) => {
      update(task.id, task.start, task.end, progress);
    }
  });
}

// --------------------
// UPDATE (EXISTING)
// --------------------
function update(id, start, end, progress) {

  const url =
    `${API_URL}?id=${id}` +
    `&start=${toDateString(start)}` +
    `&end=${toDateString(end)}` +
    `&progress=${progress}`;

  fetch(url)
    .then(r => r.text())
    .then(res => {
      console.log("UPDATED:", res);
      loadTasks();
    });
}

// --------------------
// ADD TASK
// --------------------
function addTaskUI() {

  const task = prompt("Task name?");
  const start = prompt("Start date (YYYY-MM-DD)");
  const end = prompt("End date (YYYY-MM-DD)");

  if (!task || !start || !end) return;

  const id = Date.now();

  const url =
    `${API_URL}?action=add` +
    `&id=${id}` +
    `&task=${encodeURIComponent(task)}` +
    `&start=${start}` +
    `&end=${end}` +
    `&progress=0`;

  fetch(url)
    .then(r => r.text())
    .then(res => {
      console.log(res);
      loadTasks();
    });
}

// --------------------
// DELETE TASK
// --------------------
function deleteTaskUI() {

  const id = prompt("Enter Task ID to delete:");

  if (!id) return;

  const url =
    `${API_URL}?action=delete&id=${id}`;

  fetch(url)
    .then(r => r.text())
    .then(res => {
      console.log(res);
      loadTasks();
    });
}

// --------------------
// INIT
// --------------------
window.addEventListener("load", loadTasks);

</script>

</body>
</html>
