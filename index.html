<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Gantt Project</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.css">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    #gantt {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h2>Project Gantt</h2>

<div id="gantt"></div>

<script src="https://cdn.jsdelivr.net/npm/frappe-gantt@0.6.1/dist/frappe-gantt.min.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwwTTsvFxY26jIw-xs-NPuXHW5HqoGTpi-yyrNpH3YYW1b427clYjVm25kZNpNbWC2O/exec";

// =========================
// SAFE DATE FORMAT (no timezone shift)
// =========================
function toDateString(d) {

  if (!d) return "";

  if (typeof d === "string" && d.length === 10) return d;

  const date = new Date(d);

  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const day = String(date.getDate()).padStart(2, "0");

  return `${y}-${m}-${day}`;
}

document.addEventListener("DOMContentLoaded", loadTasks);

// =========================
function loadTasks() {

  fetch(API_URL)
    .then(r => r.json())
    .then(data => {

      const tasks = data.map(t => ({
        id: String(t.id),
        name: t.task,
        start: toDateString(t.start),
        end: toDateString(t.end),
        progress: Number(t.progress)
      }));

      render(tasks);
    })
    .catch(err => console.error("FETCH ERROR:", err));
}

// =========================
function render(tasks) {

  const container = document.getElementById("gantt");

  if (!container) {
    console.error("Missing #gantt div");
    return;
  }

  container.innerHTML = "";

  new Gantt("#gantt", tasks, {
    view_mode: "Day",
    readonly: false,

    on_date_change: (task, start, end) => {
      update(task.id, start, end, task.progress);
    },

    on_progress_change: (task, progress) => {
      update(task.id, task._start || task.start, task._end || task.end, progress);
    }
  });
}

// =========================
// POST UPDATE (FIXED)
// =========================
function update(id, start, end, progress) {

  fetch(API_URL, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain"
    },
    body: JSON.stringify({
      id,
      start: toDateString(start),
      end: toDateString(end),
      progress
    })
  })
  .then(r => r.text())
  .then(res => {
    console.log("UPDATED:", res);
    loadTasks();
  })
  .catch(err => console.error("UPDATE ERROR:", err));
}

</script>

</body>
</html>
